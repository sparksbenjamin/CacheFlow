name: Update LanCache Conf

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build lancache.conf
        run: python scripts/build_lancache_conf.py

      - name: Validate generated config
        run: |
          test -s lancache.conf
          grep -q '^server=' lancache.conf
          grep -q 'LANCACHE_IP' lancache.conf

      - name: Commit updated conf
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lancache.conf
          git diff --cached --quiet && echo "No changes to commit." || git commit -m "chore: update lancache.conf [$(date -u '+%Y-%m-%d')]"
          git push
